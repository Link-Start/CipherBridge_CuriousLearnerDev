app:
  name: 密桥
  name_en: CipherBridge
  version: '1.0'
proxy:
  default_decrypt_port: 8080
  default_encrypt_port: 8081
  default_burp_address: http://127.0.0.1:8080
  timeout: 30
gui:
  theme: dark
  font_size: 11
  max_log_lines: 5000
analyzer:
  auto_detect: true
  entropy_threshold: 0.8
replay:
  auto_sign: true
  auto_encrypt: true
